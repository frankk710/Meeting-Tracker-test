<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议保障排期表</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f8fafc; }
        .table-container {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            background: white;
            border: 1px solid #eef2f6;
        }
        
        /* 核心布局控制 */
        table { border-collapse: collapse; width: 100%; table-layout: auto; }
        
        thead th {
            background-color: #f8fafc;
            border-bottom: 2px solid #f1f5f9;
            color: #475569;
            font-weight: 700;
            padding: 16px 8px;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        tbody td {
            border-bottom: 1px solid #f8fafc;
            padding: 12px 8px;
            vertical-align: middle;
            color: #334155;
            word-break: break-all;
        }

        /* --- 列宽度硬性锁定 --- */
        .w-idx { width: 45px; text-align: center; }
        .w-time { width: 145px; text-align: center; }
        .w-loc { width: 100px; text-align: center; }
        .w-type { width: 85px; text-align: center; }
        .w-dept { width: 100px; text-align: center; }
        .w-leader { width: 165px; text-align: center; } /* 参会领导锁定宽度 */
        .w-range { width: 95px; text-align: center; }
        .w-opt { width: 85px; text-align: center; }
        
        /* 会议名称：自由伸缩 */
        .w-title { width: auto; min-width: 150px; }
        
        /* 备注：作为次要弹性列，但保证基础宽度 */
        .w-notes { min-width: 200px; max-width: 350px; text-align: left; }

        /* 领导标签样式 - 严格两列 */
        .leader-tag {
            background-color: #f1f5f9;
            color: #475569;
            text-align: center;
            width: calc(50% - 4px); /* 强制一行两个 */
            font-size: 12px;
            padding: 4px 0;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            font-weight: 600;
        }

        /* 状态底色：今日及后续（粉色） */
        .row-future {
            background-color: #fdf2f8 !important; /* 原来的粉色 */
            border-left: 4px solid #f472b6;
        }
        .row-future:hover { background-color: #fce7f3 !important; }
        
        .row-past { background-color: #ffffff; border-left: 4px solid transparent; }
        .row-past:hover { background-color: #f8fafc; }

        #mainContent { display: none; }
    </style>
</head>
<body class="p-4">

    <div id="loginOverlay" class="fixed inset-0 flex items-center justify-center z-[999] bg-slate-900/20 backdrop-blur-md">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center border border-white/50">
            <h2 class="text-xl font-bold mb-4">系统管理</h2>
            <input type="password" id="webPassInput" placeholder="访问密码" class="w-full p-3 border rounded-xl mb-4 text-center">
            <button onclick="checkLogin()" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold">登 录</button>
        </div>
    </div>

    <div id="mainContent" class="max-w-[1600px] mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-black text-slate-800 tracking-tight">📅 会议保障排期</h1>
            <button onclick="exportToExcel()" class="text-sm border px-4 py-2 rounded-lg bg-white shadow-sm hover:bg-gray-50">导出表格</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 mb-6">
            <form id="addMeetingForm" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <input type="hidden" id="edit_id">
                <div class="md:col-span-6"><label class="text-xs text-gray-400">会议名称</label><input type="text" id="title" required class="w-full p-2 border rounded-lg text-sm"></div>
                <div class="md:col-span-3"><label class="text-xs text-gray-400">开始时间</label><input type="datetime-local" id="meeting_time" required class="w-full p-2 border rounded-lg text-sm"></div>
                <div class="md:col-span-3"><label class="text-xs text-gray-400">结束时间</label><input type="datetime-local" id="meeting_end_time" class="w-full p-2 border rounded-lg text-sm"></div>
                <div class="md:col-span-2"><label class="text-xs text-gray-400">地点</label><input type="text" id="location" required class="w-full p-2 border rounded-lg text-sm"></div>
                <div class="md:col-span-2"><label class="text-xs text-gray-400">类型</label><select id="meeting_type" class="w-full p-2 border rounded-lg text-sm"><option>本地会</option><option>视频会</option><option>调度会</option></select></div>
                <div class="md:col-span-2"><label class="text-xs text-gray-400">主办科室</label><input type="text" id="department" class="w-full p-2 border rounded-lg text-sm"></div>
                <div class="md:col-span-3"><label class="text-xs text-gray-400">参会领导</label><input type="text" id="leader" class="w-full p-2 border rounded-lg text-sm"></div>
                <div class="md:col-span-3"><label class="text-xs text-gray-400">范围</label><input type="text" id="status" class="w-full p-2 border rounded-lg text-sm"></div>
                <div class="md:col-span-10"><label class="text-xs text-gray-400">备注</label><input type="text" id="notes" class="w-full p-2 border rounded-lg text-sm"></div>
                <div class="md:col-span-2 flex items-end"><button type="submit" class="w-full bg-slate-800 text-white p-2 rounded-lg font-bold text-sm">保存</button></div>
            </form>
        </div>

        <div class="table-container">
            <table id="meetingTableMain">
                <thead>
                    <tr>
                        <th class="w-idx">序号</th>
                        <th class="w-title">会议名称</th>
                        <th class="w-time">起止时间</th>
                        <th class="w-loc">地点</th>
                        <th class="w-type">类型</th>
                        <th class="w-dept">主办科室</th>
                        <th class="w-leader">参会领导</th>
                        <th class="w-range">范围</th>
                        <th class="w-notes">备注</th>
                        <th class="w-opt no-export">操作</th>
                    </tr>
                </thead>
                <tbody id="meetingList"></tbody>
            </table>
        </div>
    </div>

    <script>
        let meetingDataList = [];
        let authToken = sessionStorage.getItem('meeting_access_token');

        async function checkLogin() {
            const pwd = document.getElementById('webPassInput').value;
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': pwd } });
            if (res.ok) { sessionStorage.setItem('meeting_access_token', pwd); authToken = pwd; showSystem(); }
            else { alert('密码错误'); }
        }

        function showSystem() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            loadMeetings();
        }

        async function loadMeetings() {
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': authToken } });
            meetingDataList = await res.json();
            renderTable();
        }

        function createLeaderTags(str) {
            if (!str || str === '-') return '-';
            const names = str.split(/[、,，\s]+/).filter(n => n.trim() !== '');
            let html = `<div class="flex flex-wrap gap-1 justify-center">`;
            names.forEach(name => { html += `<span class="leader-tag">${name}</span>`; });
            html += `</div>`;
            return html;
        }

        function renderTable() {
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];

            meetingDataList.forEach((m, index) => {
                const isFuture = m.meeting_time.split('T')[0] >= todayStr;
                const rowClass = isFuture ? 'row-future' : 'row-past';
                
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td class="w-idx text-gray-400 text-xs">${index + 1}</td>
                        <td class="w-title font-bold text-slate-800 text-sm">${m.title}</td>
                        <td class="w-time">
                            <div class="text-[11px] text-blue-600 font-bold">始: ${m.meeting_time.replace('T',' ')}</div>
                            <div class="text-[11px] text-red-400 font-bold">终: ${m.meeting_end_time?.replace('T',' ') || '-'}</div>
                        </td>
                        <td class="w-loc text-xs">${m.location}</td>
                        <td class="w-type text-center">
                            <span class="px-2 py-0.5 rounded-full text-[10px] bg-slate-100 text-slate-600 font-bold">${m.meeting_type}</span>
                        </td>
                        <td class="w-dept text-xs text-gray-500">${m.department || '-'}</td>
                        <td class="w-leader">${createLeaderTags(m.leader)}</td>
                        <td class="w-range text-xs">${m.status || '-'}</td>
                        <td class="w-notes text-xs text-gray-500 leading-relaxed">${m.notes || '-'}</td>
                        <td class="w-opt text-center no-export">
                            <button onclick="editMeeting(${m.id})" class="text-blue-500 text-xs mr-2">改</button>
                            <button onclick="deleteMeeting(${m.id})" class="text-red-300 text-xs">删</button>
                        </td>
                    </tr>`;
            });
        }

        // CRUD 逻辑 (保持不变)
        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                meeting_end_time: document.getElementById('meeting_end_time').value,
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                department: document.getElementById('department').value,
                leader: document.getElementById('leader').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };
            await fetch('/api/meetings', {
                method: editId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Web-Password': authToken },
                body: JSON.stringify(data)
            });
            e.target.reset();
            document.getElementById('edit_id').value = '';
            loadMeetings();
        });

        async function deleteMeeting(id) {
            if(!confirm("确定删除？")) return;
            await fetch(`/api/meetings?id=${id}`, { method: 'DELETE', headers: { 'X-Web-Password': authToken } });
            loadMeetings();
        }

        function editMeeting(id) {
            const m = meetingDataList.find(i => i.id === id);
            document.getElementById('edit_id').value = m.id;
            document.getElementById('title').value = m.title;
            document.getElementById('meeting_time').value = m.meeting_time;
            document.getElementById('meeting_end_time').value = m.meeting_end_time || '';
            document.getElementById('location').value = m.location;
            document.getElementById('meeting_type').value = m.meeting_type;
            document.getElementById('department').value = m.department || '';
            document.getElementById('leader').value = m.leader || '';
            document.getElementById('status').value = m.status || '';
            document.getElementById('notes').value = m.notes || '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exportToExcel() {
            const table = document.getElementById('meetingTableMain');
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, `会议排期表_${new Date().toLocaleDateString()}.xlsx`);
        }

        if (authToken) showSystem();
    </script>
</body>
</html>
