<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议保障排期表 - 优化版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .table-container {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            background: white;
        }
        table { border-collapse: collapse; width: 100%; table-layout: auto; }
        
        /* 1. 强制所有表头标题不换行 */
        thead th {
            background-color: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #f3f4f6;
            color: #374151;
            font-weight: 700;
            padding: 16px 12px !important;
            font-size: 0.95rem;
            vertical-align: middle;
            white-space: nowrap !important; 
        }

        tbody td {
            border-bottom: 1px solid #f3f4f6;
            border-right: 1px solid #f3f4f6;
            padding: 14px 12px !important;
            vertical-align: middle;
            color: #4b5563;
        }

        /* 参会领导列的固定宽度和布局 */
        .leader-column {
            min-width: 140px;
            max-width: 160px;
        }

        /* 备注列保留换行 */
        .notes-column {
            min-width: 200px;
            word-break: break-all;
            white-space: normal !important;
            text-align: left !important;
        }

        #mainContent { display: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 3px; }

        /* 输入框视觉强化 */
        .form-control {
            border: 2px solid #d1d5db !important; 
            background-color: #fcfcfc !important;
            transition: all 0.2s;
        }
        .form-control:focus {
            background-color: #fff !important;
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15) !important;
            outline: none;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginOverlay" class="fixed inset-0 flex items-center justify-center z-[999]">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-400 to-sky-200"></div>
        <div class="relative bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-[400px] text-center">
            <h2 class="text-2xl font-black mb-6 text-gray-800">安全认证</h2>
            <input type="password" id="webPassInput" placeholder="请输入访问密码" onkeypress="if(event.keyCode==13) checkLogin()" class="form-control w-full p-4 rounded-2xl text-center mb-4">
            <button onclick="checkLogin()" class="w-full bg-blue-500 text-white p-4 rounded-2xl font-bold hover:bg-blue-600">进入系统</button>
            <p id="loginError" class="text-red-500 mt-4 text-sm hidden">⚠️ 密码错误</p>
        </div>
    </div>

    <div id="mainContent" class="p-6">
        <div class="w-[98%] mx-auto">
            <div class="flex justify-between items-end mb-8">
                <h1 class="text-3xl font-black text-blue-600">🗓️ 会议保障排期表</h1>
                <button onclick="exportToExcel()" class="bg-emerald-500 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-emerald-600 transition-all">导出表格</button>
            </div>

            <div class="bg-white p-8 rounded-[2rem] shadow-sm mb-8 border border-gray-100">
                <form id="addMeetingForm" class="grid grid-cols-1 md:grid-cols-12 gap-5">
                    <input type="hidden" id="edit_id">
                    <div class="md:col-span-6 flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-500">会议名称</label>
                        <input type="text" id="title" required class="form-control p-3 rounded-2xl">
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-500">开始时间</label>
                        <input type="datetime-local" id="meeting_time" required class="form-control p-3 rounded-2xl">
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-500">结束时间</label>
                        <input type="datetime-local" id="meeting_end_time" required class="form-control p-3 rounded-2xl">
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-500">地点</label>
                        <select id="location" required class="form-control p-3 rounded-2xl">
                            <option value="会商室">会商室</option>
                            <option value="值班室">值班室</option>
                            <option value="指挥中心">指挥中心</option>
                            <option value="西会议室">西会议室</option>
                        </select>
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-500">类型</label>
                        <select id="meeting_type" class="form-control p-3 rounded-2xl">
                            <option value="本地会">本地会</option>
                            <option value="视频会">视频会</option>
                            <option value="调度会">调度会</option>
                        </select>
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-500">参会领导 (空格或逗号隔开)</label>
                        <input type="text" id="leader" class="form-control p-3 rounded-2xl">
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs font-bold text-gray-500">参会范围</label>
                        <select id="status" class="form-control p-3 rounded-2xl">
                            <option value="市级">市级</option>
                            <option value="区市参加">区市参加</option>
                            <option value="区市、镇街参加">区市、镇街参加</option>
                        </select>
                    </div>
                    <div class="md:col-span-12">
                        <label class="text-xs font-bold text-gray-500">保障备注</label>
                        <input type="text" id="notes" class="form-control p-3 rounded-2xl w-full">
                    </div>
                    <div class="md:col-span-12 flex justify-end">
                        <button type="submit" class="bg-blue-600 text-white px-12 py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700">保存会议</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <div class="overflow-x-auto">
                    <table id="meetingTableMain">
                        <thead>
                            <tr>
                                <th class="text-center">序号</th>
                                <th class="text-center">会议名称</th>
                                <th class="text-center">时间（起/止）</th>
                                <th class="text-center">地点</th>
                                <th class="text-center">类型</th>
                                <th class="text-center">参会领导</th>
                                <th class="text-center">参会范围</th>
                                <th class="text-left notes-column">保障备注</th>
                                <th class="text-center no-export">操作</th>
                            </tr>
                        </thead>
                        <tbody id="meetingList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let meetingDataList = [];
        let authToken = sessionStorage.getItem('meeting_access_token');

        window.onload = () => { if (authToken) showSystem(); };

        async function checkLogin() {
            const pwd = document.getElementById('webPassInput').value;
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': pwd } });
            if (res.ok) { sessionStorage.setItem('meeting_access_token', pwd); authToken = pwd; showSystem(); }
            else { document.getElementById('loginError').classList.remove('hidden'); }
        }

        function showSystem() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            loadMeetings();
        }

        async function loadMeetings() {
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': authToken } });
            meetingDataList = await res.json();
            renderTable();
        }

        // 核心功能：创建领导标签，一行显示两个，自动换行
        function createLeaderTags(str) {
            if (!str || str === '-') return '-';
            const names = str.split(/[、,，\s]+/).filter(n => n.trim() !== '');
            
            // 使用 flex-wrap 和 w-[calc(50%-4px)] 确保一行只排两个
            let html = `<div class="flex flex-wrap gap-2 justify-center w-full">`;
            names.forEach(name => {
                html += `<span class="inline-block bg-blue-50 text-blue-700 border border-blue-100 px-2 py-1 rounded-lg text-xs font-bold whitespace-nowrap text-center w-[calc(50%-4px)]">${name}</span>`;
            });
            html += `</div>`;
            return html;
        }

        function renderTable() {
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            meetingDataList.forEach((m, index) => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="text-center text-sm font-mono">${index + 1}</td>
                        <td class="text-center text-sm font-bold text-gray-800">${m.title}</td>
                        <td class="text-center text-xs">
                            <div class="text-blue-600">始: ${m.meeting_time.replace('T', ' ')}</div>
                            <div class="text-red-500">终: ${m.meeting_end_time.replace('T', ' ')}</div>
                        </td>
                        <td class="text-center text-sm">${m.location}</td>
                        <td class="text-center">
                            <span class="px-2 py-1 rounded-full bg-blue-100 text-blue-700 text-[10px] font-bold">${m.meeting_type}</span>
                        </td>
                        <td class="leader-column text-center">${createLeaderTags(m.leader)}</td>
                        <td class="text-center text-sm">${m.status}</td>
                        <td class="notes-column text-sm">${m.notes || '-'}</td>
                        <td class="text-center no-export">
                            <button onclick="editMeeting(${m.id})" class="text-blue-500 mr-2">修改</button>
                            <button onclick="deleteMeeting(${m.id})" class="text-red-400">删除</button>
                        </td>
                    </tr>`;
            });
        }

        // 其余 CRUD 逻辑与之前一致...
        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                meeting_end_time: document.getElementById('meeting_end_time').value,
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                leader: document.getElementById('leader').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };
            await fetch('/api/meetings', {
                method: editId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Web-Password': authToken },
                body: JSON.stringify(data)
            });
            e.target.reset();
            document.getElementById('edit_id').value = '';
            loadMeetings();
        });

        async function deleteMeeting(id) {
            if(!confirm("确定删除？")) return;
            await fetch(`/api/meetings?id=${id}`, { 
                method: 'DELETE', 
                headers: { 'X-Web-Password': authToken, 'X-Admin-Password': authToken } 
            });
            loadMeetings();
        }

        function editMeeting(id) {
            const m = meetingDataList.find(i => i.id === id);
            document.getElementById('edit_id').value = m.id;
            document.getElementById('title').value = m.title;
            document.getElementById('meeting_time').value = m.meeting_time;
            document.getElementById('meeting_end_time').value = m.meeting_end_time;
            document.getElementById('location').value = m.location;
            document.getElementById('meeting_type').value = m.meeting_type;
            document.getElementById('leader').value = m.leader;
            document.getElementById('status').value = m.status;
            document.getElementById('notes').value = m.notes;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exportToExcel() {
            const table = document.getElementById('meetingTableMain');
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, `会议保障排期表.xlsx`);
        }
    </script>
</body>
</html>
