<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议保障清单 - 时间优化版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .table-container {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            background: white;
        }
        table { border-collapse: collapse; width: 100%; table-layout: auto; }
        thead th {
            background-color: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            border-right: 1px solid #f3f4f6;
            color: #374151;
            font-weight: 700;
            padding: 16px 12px !important;
            font-size: 0.95rem;
            vertical-align: middle;
        }
        tbody td {
            border-bottom: 1px solid #f3f4f6;
            border-right: 1px solid #f3f4f6;
            padding: 14px 12px !important;
            vertical-align: middle;
            color: #4b5563;
        }
        .nowrap-column { white-space: nowrap !important; width: 1%; }
        .notes-column { min-width: 150px; word-break: break-all; white-space: normal !important; text-align: left !important; }
        #mainContent { display: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="loginOverlay" class="fixed inset-0 flex items-center justify-center z-[999] overflow-hidden">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-400 to-sky-200"></div>
        <div class="relative bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-[400px] border border-white/50 text-center">
            <div class="w-20 h-20 bg-blue-500 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-2xl font-black mb-2 text-gray-800 tracking-tight">安全认证</h2>
            <div class="space-y-4">
                <input type="password" id="webPassInput" placeholder="请输入访问密码" onkeypress="if(event.keyCode==13) checkLogin()" class="w-full bg-white/50 border border-blue-100 p-4 rounded-2xl text-center text-lg font-bold text-blue-900 outline-none">
                <button onclick="checkLogin()" class="w-full bg-blue-500 hover:bg-blue-600 text-white p-4 rounded-2xl font-bold text-lg shadow-lg transition-all active:scale-95">立即进入</button>
            </div>
            <p id="loginError" class="text-red-500 mt-4 text-sm font-medium hidden">⚠️ 密码错误</p>
        </div>
    </div>

    <div id="mainContent" class="p-6">
        <div class="w-[98%] mx-auto">
            <div class="flex justify-between items-end mb-8">
                <div>
                    <h1 class="text-3xl font-black text-blue-600">📝 会议保障排期表</h1>
                    <p class="text-gray-400 text-sm mt-1">系统已就绪，粉色高亮显示今日及后续会议</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-md transition-all flex items-center gap-2">导出表格</button>
                    <button onclick="logout()" class="text-gray-400 hover:text-red-500 text-sm font-medium">退出登录</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-gray-100">
                <h2 class="text-xl font-bold mb-4 text-gray-700" id="formTitle">➕ 新增会议任务</h2>
                <form id="addMeetingForm" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="hidden" id="edit_id" value="">
                    
                    <input type="text" id="title" placeholder="会议名称" required class="border p-3 rounded-xl md:col-span-2 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-200">
                    
                    <div class="md:col-span-2 flex items-center gap-2 bg-gray-50 border rounded-xl px-3 group focus-within:ring-2 focus-within:ring-blue-200 transition-all">
                        <div class="flex flex-col flex-1 py-1">
                            <span class="text-[10px] text-blue-500 font-bold">开始时间</span>
                            <input type="datetime-local" id="meeting_time" required class="bg-transparent outline-none text-sm text-gray-600">
                        </div>
                        <div class="h-8 w-[1px] bg-gray-300 mx-1"></div>
                        <div class="flex flex-col flex-1 py-1">
                            <span class="text-[10px] text-red-400 font-bold">结束时间</span>
                            <input type="datetime-local" id="meeting_end_time" required class="bg-transparent outline-none text-sm text-gray-600">
                        </div>
                    </div>
                    
                    <select id="location" required class="border p-3 rounded-xl bg-gray-50 outline-none">
                        <option value="" disabled selected>选择会议地点</option>
                        <option value="会商室">会商室</option>
                        <option value="值班室">值班室</option>
                        <option value="指挥中心">指挥中心</option>
                        <option value="西会议室">西会议室</option>
                    </select>

                    <select id="meeting_type" class="border p-3 rounded-xl bg-gray-50 outline-none">
                        <option value="本地会">本地会</option>
                        <option value="视频会">视频会</option>
                        <option value="调度会">调度会</option>
                        <option value="参观接待">参观接待</option>
                        <option value="突发事件">突发事件</option>
                    </select>

                    <input type="text" id="department" placeholder="主办科室" class="border p-3 rounded-xl bg-gray-50">
                    
                    <select id="status" class="border p-3 rounded-xl bg-gray-50">
                        <option value="市级">市级</option>
                        <option value="区市参加">区市参加</option>
                        <option value="区市、镇街参加">区市、镇街参加</option>
                    </select>

                    <input type="text" id="leader" placeholder="参会领导" class="border p-3 rounded-xl bg-gray-50">
                    <input type="text" id="notes" placeholder="保障要求与备注" class="border p-3 rounded-xl md:col-span-3 bg-gray-50 outline-none">
                    
                    <div class="md:col-span-4 mt-2">
                        <button type="submit" id="submitBtn" class="w-full bg-blue-500 text-white p-4 rounded-xl font-black text-lg shadow-lg hover:bg-blue-600 transition-colors">
                            保存会议排期
                        </button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <div class="overflow-x-auto">
                    <table id="meetingTableMain">
                        <thead>
                            <tr>
                                <th class="text-center nowrap-column">序号</th>
                                <th class="text-center">会议名称</th>
                                <th class="text-center">会议时间 (起-止)</th>
                                <th class="text-center nowrap-column">地点</th>
                                <th class="text-center nowrap-column">类型</th>
                                <th class="text-center">主办科室</th>
                                <th class="text-center">参会领导</th>
                                <th class="text-center">范围</th>
                                <th class="text-left notes-column">备注</th>
                                <th class="text-center no-export">操作</th>
                            </tr>
                        </thead>
                        <tbody id="meetingList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let meetingDataList = [];
        let authToken = sessionStorage.getItem('meeting_access_token');

        window.onload = () => { if (authToken) showSystem(); };

        async function checkLogin() {
            const pwd = document.getElementById('webPassInput').value;
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': pwd } });
            if (res.ok) { sessionStorage.setItem('meeting_access_token', pwd); authToken = pwd; showSystem(); }
            else { document.getElementById('loginError').classList.remove('hidden'); }
        }

        function showSystem() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            loadMeetings();
        }

        function logout() { sessionStorage.removeItem('meeting_access_token'); location.reload(); }

        async function loadMeetings() {
            try {
                const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': authToken } });
                if (!res.ok) { logout(); return; }
                meetingDataList = await res.json();
                renderTable();
            } catch (e) { console.error(e); }
        }

        function renderTable() {
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            const today = new Date(); today.setHours(0, 0, 0, 0);

            meetingDataList.forEach((m, index) => {
                const mStart = new Date(m.meeting_time);
                const isFuture = mStart >= today;
                const rowClass = isFuture ? 'bg-[#b367b5]/10 border-l-4 border-l-[#b367b5]' : 'opacity-60 bg-white';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-[#b367b5]/20 transition-colors ${rowClass}">
                        <td class="text-center text-gray-400 font-mono text-xs">${index + 1}</td>
                        <td class="text-center text-sm font-bold text-gray-800">${m.title}</td>
                        <td class="text-center text-[11px] leading-tight text-gray-500">
                            ${m.meeting_time.replace('T', ' ')}<br>
                            <span class="text-gray-300">至</span><br>
                            ${(m.meeting_end_time || '未设定').replace('T', ' ')}
                        </td>
                        <td class="text-center text-sm">${m.location}</td>
                        <td class="text-center"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold border border-gray-200 bg-gray-50">${m.meeting_type}</span></td>
                        <td class="text-center text-sm">${m.department || '-'}</td>
                        <td class="text-center">${createLeaderTags(m.leader)}</td>
                        <td class="text-center text-xs">${m.status}</td>
                        <td class="notes-column text-xs text-gray-500">${m.notes || '-'}</td>
                        <td class="text-center no-export">
                            <button onclick="editMeeting(${m.id})" class="text-blue-500 font-bold underline text-xs mr-2">修改</button>
                            <button onclick="deleteMeeting(${m.id})" class="text-red-400 underline text-xs">删除</button>
                        </td>
                    </tr>`;
            });
        }

        function createLeaderTags(str) {
            if (!str || str === '-') return '-';
            return str.split(/[、,，\s]+/).filter(n => n.trim() !== '').map(name => 
                `<span class="inline-block bg-blue-50 text-gray-700 border border-blue-100 px-1.5 py-0.5 rounded-md mr-1 mb-1 text-[11px] whitespace-nowrap">${name}</span>`
            ).join('');
        }

        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                meeting_end_time: document.getElementById('meeting_end_time').value, // 新增字段
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                department: document.getElementById('department').value,
                leader: document.getElementById('leader').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };

            await fetch('/api/meetings', {
                method: editId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Web-Password': authToken },
                body: JSON.stringify(data)
            });
            resetForm(); loadMeetings();
        });

        function editMeeting(id) {
            const m = meetingDataList.find(i => i.id === id);
            document.getElementById('edit_id').value = m.id;
            document.getElementById('title').value = m.title;
            document.getElementById('meeting_time').value = m.meeting_time;
            document.getElementById('meeting_end_time').value = m.meeting_end_time || ''; // 回显结束时间
            document.getElementById('location').value = m.location;
            document.getElementById('meeting_type').value = m.meeting_type;
            document.getElementById('department').value = m.department;
            document.getElementById('leader').value = m.leader;
            document.getElementById('status').value = m.status;
            document.getElementById('notes').value = m.notes;
            document.getElementById('formTitle').innerText = '✏️ 修改会议记录';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMeeting(id) {
            const pwd = prompt("删除确认密码："); if (!pwd) return;
            const res = await fetch(`/api/meetings?id=${id}`, {
                method: 'DELETE',
                headers: { 'X-Admin-Password': pwd, 'X-Web-Password': authToken }
            });
            if (res.ok) loadMeetings(); else alert("认证失败");
        }

        function resetForm() {
            document.getElementById('addMeetingForm').reset();
            document.getElementById('edit_id').value = '';
            document.getElementById('formTitle').innerText = '➕ 新增会议任务';
        }

        function exportToExcel() {
            const table = document.getElementById('meetingTableMain');
            const noExportItems = document.querySelectorAll('.no-export');
            noExportItems.forEach(el => el.style.display = 'none');
            const wb = XLSX.utils.table_to_book(table, { sheet: "会议排期" });
            noExportItems.forEach(el => el.style.display = '');
            XLSX.writeFile(wb, `会议保障排期表_${new Date().toLocaleDateString()}.xlsx`);
        }
    </script>
</body>
</html>
