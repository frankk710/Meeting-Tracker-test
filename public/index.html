<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议保障排期表 - 布局优化版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .table-container {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.1);
            background: white;
        }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        
        thead th {
            background-color: #f9fafb;
            border-bottom: 2px solid #f3f4f6;
            color: #374151;
            font-weight: 700;
            padding: 12px 4px !important;
            font-size: 13px;
        }

        tbody td {
            border-bottom: 1px solid #f9fafb;
            padding: 10px 4px !important;
            vertical-align: middle;
            color: #4b5563;
        }

        /* 列宽精细化固定 */
        .col-id { width: 45px; }
        .col-title { width: auto; min-width: 180px; }
        .col-time { width: 140px; } /* 锁定时间列宽度 */
        .col-loc { width: 90px; }
        .col-type { width: 85px; }
        .col-dept { width: 95px; }
        .col-notes { width: 200px; }
        .col-action { width: 75px; }

        .notes-text { font-size: 11px !important; line-height: 1.4; color: #6b7280; word-break: break-all; }
        #mainContent { display: none; }
        
        /* 统一输入框高度和样式 */
        .custom-input {
            height: 50px;
            border: 1px solid #e5e7eb;
            background-color: #f9fafb;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
        }
        .custom-input:focus-within {
            border-color: #3b82f6;
            ring: 2px;
            ring-color: #dbeafe;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 p-4 md:p-8">

    <div id="loginOverlay" class="fixed inset-0 flex items-center justify-center z-[999]">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-600 to-indigo-500"></div>
        <div class="relative bg-white/95 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-[380px] text-center">
            <h2 class="text-xl font-black mb-6 text-slate-800">安全认证访问</h2>
            <input type="password" id="webPassInput" placeholder="输入访问密码" onkeypress="if(event.keyCode==13) checkLogin()" class="w-full border-2 border-slate-100 p-3 rounded-xl text-center mb-4 outline-none focus:border-blue-500 transition-all">
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold shadow-lg transition-all">进入系统</button>
            <p id="loginError" class="text-red-500 mt-3 text-xs hidden">密码错误，请重试</p>
        </div>
    </div>

    <div id="mainContent">
        <div class="max-w-[1600px] mx-auto">
            <div class="flex justify-between items-end mb-6">
                <div>
                    <h1 class="text-2xl font-black text-slate-800">📅 会议保障排期系统</h1>
                    <p class="text-slate-400 text-xs mt-1 italic">提示：时间列固定宽度，分行显示“起/止”时刻</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition-all">导出表格</button>
                    <button onclick="logout()" class="text-slate-400 text-sm hover:text-red-500 transition-all">退出</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6">
                <form id="addMeetingForm" class="grid grid-cols-1 md:grid-cols-12 gap-3 items-center">
                    <input type="hidden" id="edit_id" value="">
                    
                    <input type="text" id="title" placeholder="会议名称" required class="md:col-span-3 custom-input px-4 text-sm focus:bg-white">
                    
                    <div class="md:col-span-4 flex items-center gap-2 custom-input px-3 focus-within:bg-white">
                        <div class="flex-1 flex flex-col justify-center">
                            <span class="text-[9px] text-blue-500 font-bold ml-1 leading-none mb-1">开始时间</span>
                            <input type="datetime-local" id="meeting_time" required class="bg-transparent text-xs outline-none cursor-pointer">
                        </div>
                        <div class="w-[1px] h-6 bg-slate-200"></div>
                        <div class="flex-1 flex flex-col justify-center">
                            <span class="text-[9px] text-pink-500 font-bold ml-1 leading-none mb-1">结束时间</span>
                            <input type="datetime-local" id="meeting_end_time" required class="bg-transparent text-xs outline-none cursor-pointer">
                        </div>
                    </div>

                    <select id="location" required class="md:col-span-2 custom-input px-3 text-sm">
                        <option value="" disabled selected>选择地点</option>
                        <option value="会商室">会商室</option>
                        <option value="值班室">值班室</option>
                        <option value="指挥中心">指挥中心</option>
                        <option value="西会议室">西会议室</option>
                    </select>

                    <select id="meeting_type" class="md:col-span-1 custom-input px-2 text-xs">
                        <option value="本地会">本地会</option>
                        <option value="视频会">视频会</option>
                    </select>

                    <input type="text" id="department" placeholder="主办科室" class="md:col-span-2 custom-input px-3 text-sm">

                    <input type="text" id="notes" placeholder="保障要求/备注（选填）" class="md:col-span-10 custom-input px-4 text-sm focus:bg-white">
                    <button type="submit" class="md:col-span-2 bg-slate-800 text-white h-[50px] rounded-xl font-bold hover:bg-slate-900 transition-all shadow-md">
                        保存排期
                    </button>
                </form>
            </div>

            <div class="table-container">
                <div class="overflow-x-auto">
                    <table id="meetingTableMain">
                        <thead>
                            <tr class="text-center">
                                <th class="col-id">序号</th>
                                <th class="col-title text-left pl-4">会议名称</th>
                                <th class="col-time">保障时间</th>
                                <th class="col-loc">地点</th>
                                <th class="col-type">类型</th>
                                <th class="col-dept">科室</th>
                                <th class="col-notes text-left pl-4">备注要求</th>
                                <th class="col-action no-export">操作</th>
                            </tr>
                        </thead>
                        <tbody id="meetingList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let meetingDataList = [];
        let authToken = sessionStorage.getItem('meeting_access_token');

        window.onload = () => { if (authToken) showSystem(); };

        async function checkLogin() {
            const pwd = document.getElementById('webPassInput').value;
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': pwd } });
            if (res.ok) { sessionStorage.setItem('meeting_access_token', pwd); authToken = pwd; showSystem(); }
            else { document.getElementById('loginError').classList.remove('hidden'); }
        }

        function showSystem() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            loadMeetings();
        }

        function logout() { sessionStorage.removeItem('meeting_access_token'); location.reload(); }

        async function loadMeetings() {
            try {
                const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': authToken } });
                if (!res.ok) { logout(); return; }
                meetingDataList = await res.json();
                renderTable();
            } catch (e) { console.error(e); }
        }

        function renderTable() {
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            const todayStr = new Date().toISOString().split('T')[0];

            meetingDataList.forEach((m, index) => {
                const isFuture = m.meeting_time.split('T')[0] >= todayStr;
                const rowClass = isFuture ? 'bg-white' : 'bg-gray-50 opacity-60';
                
                // 时间处理逻辑
                const sDate = m.meeting_time.split('T')[0];
                const sTime = m.meeting_time.split('T')[1];
                const eTime = (m.meeting_end_time || '').split('T')[1] || '--:--';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors ${rowClass}">
                        <td class="text-center font-mono text-[10px] text-slate-400">${index + 1}</td>
                        <td class="col-title pl-4 py-3">
                            <div class="text-sm font-bold text-slate-800 leading-tight">${m.title}</div>
                        </td>
                        <td class="col-time text-center">
                            <div class="text-[10px] text-slate-400 mb-1 font-medium">${sDate}</div>
                            <div class="flex flex-col gap-0.5">
                                <div class="text-[11px] font-bold text-blue-600 flex items-center justify-center gap-1">
                                    <span class="bg-blue-100 px-1 rounded-[4px] text-[9px]">始</span>${sTime}
                                </div>
                                <div class="text-[11px] font-bold text-pink-500 flex items-center justify-center gap-1">
                                    <span class="bg-pink-100 px-1 rounded-[4px] text-[9px]">终</span>${eTime}
                                </div>
                            </div>
                        </td>
                        <td class="col-loc text-center text-xs font-bold text-slate-600">${m.location}</td>
                        <td class="col-type text-center">
                            <span class="px-2 py-0.5 rounded-md border border-slate-200 bg-white text-[10px] font-bold">
                                ${m.meeting_type}
                            </span>
                        </td>
                        <td class="col-dept text-center text-xs">${m.department || '-'}</td>
                        <td class="col-notes pl-4 notes-text">${m.notes || '-'}</td>
                        <td class="col-action no-export text-center">
                            <div class="flex flex-col gap-1 items-center">
                                <button onclick="editMeeting(${m.id})" class="text-blue-500 font-bold text-[10px] hover:underline">修改</button>
                                <button onclick="deleteMeeting(${m.id})" class="text-red-300 font-bold text-[10px] hover:text-red-500">删除</button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                meeting_end_time: document.getElementById('meeting_end_time').value,
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                department: document.getElementById('department').value,
                notes: document.getElementById('notes').value,
                leader: '-', status: '市级' 
            };
            await fetch('/api/meetings', {
                method: editId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Web-Password': authToken },
                body: JSON.stringify(data)
            });
            resetForm(); loadMeetings();
        });

        function editMeeting(id) {
            const m = meetingDataList.find(i => i.id === id);
            document.getElementById('edit_id').value = m.id;
            document.getElementById('title').value = m.title;
            document.getElementById('meeting_time').value = m.meeting_time;
            document.getElementById('meeting_end_time').value = m.meeting_end_time || '';
            document.getElementById('location').value = m.location;
            document.getElementById('meeting_type').value = m.meeting_type;
            document.getElementById('department').value = m.department;
            document.getElementById('notes').value = m.notes;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMeeting(id) {
            const pwd = prompt("删除确认密码："); if (!pwd) return;
            await fetch(`/api/meetings?id=${id}`, {
                method: 'DELETE',
                headers: { 'X-Admin-Password': pwd, 'X-Web-Password': authToken }
            });
            loadMeetings();
        }

        function resetForm() {
            document.getElementById('addMeetingForm').reset();
            document.getElementById('edit_id').value = '';
        }

        function exportToExcel() {
            const table = document.getElementById('meetingTableMain');
            const noExportItems = document.querySelectorAll('.no-export');
            noExportItems.forEach(el => el.style.display = 'none');
            const wb = XLSX.utils.table_to_book(table, { sheet: "会议保障" });
            noExportItems.forEach(el => el.style.display = '');
            XLSX.writeFile(wb, `会议排期表_${new Date().toLocaleDateString()}.xlsx`);
        }
    </script>
</body>
</html>
