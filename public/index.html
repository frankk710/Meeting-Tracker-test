<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议保障清单 - 完美布局版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 核心布局策略 */
        .table-container {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.1);
            background: white;
        }
        table { border-collapse: collapse; width: 100%; table-layout: fixed; } /* 固定布局控制宽度 */
        
        thead th {
            background-color: #f9fafb;
            border-bottom: 2px solid #f3f4f6;
            color: #374151;
            font-weight: 700;
            padding: 10px 4px !important;
            font-size: 13px;
        }

        tbody td {
            border-bottom: 1px solid #f9fafb;
            padding: 8px 4px !important;
            vertical-align: middle;
            color: #4b5563;
            word-wrap: break-word;
        }

        /* 列宽精细分配 */
        .col-id { width: 40px; }
        .col-title { width: auto; min-width: 150px; } /* 会议名称自动拉伸 */
        .col-time { width: 125px; } /* 时间列上下排列后只需125px */
        .col-loc { width: 85px; }
        .col-type { width: 80px; }
        .col-dept { width: 90px; }
        .col-leader { width: 120px; }
        .col-range { width: 90px; }
        .col-notes { width: 180px; } /* 限制备注宽度 */
        .col-action { width: 70px; }

        /* 文本溢出与换行处理 */
        .text-tight { line-height: 1.25; }
        .tag-nowrap { white-space: nowrap; display: inline-flex; }
        
        #mainContent { display: none; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="loginOverlay" class="fixed inset-0 flex items-center justify-center z-[999]">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-500 to-indigo-400"></div>
        <div class="relative bg-white/90 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-[380px] text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg text-white text-3xl font-bold">密</div>
            <h2 class="text-xl font-black mb-6">安全认证访问</h2>
            <input type="password" id="webPassInput" placeholder="输入访问密码" onkeypress="if(event.keyCode==13) checkLogin()" class="w-full border-2 border-blue-100 p-3 rounded-xl text-center mb-4 outline-none focus:border-blue-500 transition-all">
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold transition-all shadow-md">确认进入</button>
            <p id="loginError" class="text-red-500 mt-3 text-xs hidden">密码不正确，请重新输入</p>
        </div>
    </div>

    <div id="mainContent" class="p-4 md:p-8">
        <div class="max-w-[1650px] mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-6 gap-4">
                <div>
                    <h1 class="text-2xl font-black text-slate-800 flex items-center gap-2">
                        <span class="bg-blue-600 text-white p-1.5 rounded-lg text-lg">📅</span>
                        会议保障排期表
                    </h1>
                    <p class="text-slate-400 text-xs mt-1 italic">提示：粉色行代表今日及之后的任务，开始/结束时间已分行显示</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="exportToExcel()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-4 py-2 rounded-lg font-bold text-sm shadow-sm transition-all">导出表格</button>
                    <button onclick="logout()" class="bg-white border text-slate-400 px-4 py-2 rounded-lg text-sm hover:text-red-500 transition-all">退出</button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 mb-6">
                <h2 class="text-sm font-bold mb-4 text-slate-500 flex items-center gap-2" id="formTitle">
                    <span class="w-2 h-2 bg-blue-500 rounded-full"></span> 新增任务排期
                </h2>
                <form id="addMeetingForm" class="grid grid-cols-1 md:grid-cols-12 gap-3">
                    <input type="hidden" id="edit_id" value="">
                    
                    <input type="text" id="title" placeholder="会议名称" required class="md:col-span-4 border p-2.5 rounded-xl bg-slate-50 text-sm focus:ring-2 focus:ring-blue-100 outline-none">
                    
                    <div class="md:col-span-5 flex items-center gap-2 bg-slate-50 border rounded-xl px-2">
                        <div class="flex-1 flex flex-col py-0.5">
                            <span class="text-[9px] text-blue-500 font-bold ml-1">开始时间</span>
                            <input type="datetime-local" id="meeting_time" required class="bg-transparent text-xs outline-none">
                        </div>
                        <div class="w-[1px] h-6 bg-slate-200"></div>
                        <div class="flex-1 flex flex-col py-0.5">
                            <span class="text-[9px] text-pink-500 font-bold ml-1">结束时间</span>
                            <input type="datetime-local" id="meeting_end_time" required class="bg-transparent text-xs outline-none">
                        </div>
                    </div>

                    <select id="location" required class="md:col-span-3 border p-2.5 rounded-xl bg-slate-50 text-sm outline-none">
                        <option value="" disabled selected>选择地点</option>
                        <option value="会商室">会商室</option>
                        <option value="值班室">值班室</option>
                        <option value="指挥中心">指挥中心</option>
                        <option value="西会议室">西会议室</option>
                    </select>

                    <select id="meeting_type" class="md:col-span-2 border p-2.5 rounded-xl bg-slate-50 text-sm">
                        <option value="本地会">本地会</option>
                        <option value="视频会">视频会</option>
                        <option value="调度会">调度会</option>
                        <option value="参观接待">参观接待</option>
                    </select>

                    <input type="text" id="department" placeholder="主办科室" class="md:col-span-2 border p-2.5 rounded-xl bg-slate-50 text-sm">
                    
                    <select id="status" class="md:col-span-2 border p-2.5 rounded-xl bg-slate-50 text-sm">
                        <option value="市级">市级</option>
                        <option value="区市参加">区市参加</option>
                        <option value="区市、镇街参加">区市、镇街参加</option>
                    </select>

                    <input type="text" id="leader" placeholder="参会领导" class="md:col-span-2 border p-2.5 rounded-xl bg-slate-50 text-sm">
                    <input type="text" id="notes" placeholder="保障要求/备注" class="md:col-span-4 border p-2.5 rounded-xl bg-slate-50 text-sm outline-none">
                    
                    <button type="submit" class="md:col-span-12 bg-slate-800 text-white p-3 rounded-xl font-bold hover:bg-slate-900 transition-all shadow-lg active:scale-[0.98]">
                        确认并保存会议排期
                    </button>
                </form>
            </div>

            <div class="table-container">
                <div class="overflow-x-auto">
                    <table id="meetingTableMain">
                        <thead>
                            <tr class="text-center">
                                <th class="col-id">序号</th>
                                <th class="col-title text-left pl-4">会议名称</th>
                                <th class="col-time">会议时间</th>
                                <th class="col-loc">地点</th>
                                <th class="col-type">类型</th>
                                <th class="col-dept">主办科室</th>
                                <th class="col-leader">参会领导</th>
                                <th class="col-range">范围</th>
                                <th class="col-notes text-left pl-4">备注</th>
                                <th class="col-action no-export">操作</th>
                            </tr>
                        </thead>
                        <tbody id="meetingList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let meetingDataList = [];
        let authToken = sessionStorage.getItem('meeting_access_token');

        window.onload = () => { if (authToken) showSystem(); };

        async function checkLogin() {
            const pwd = document.getElementById('webPassInput').value;
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': pwd } });
            if (res.ok) { sessionStorage.setItem('meeting_access_token', pwd); authToken = pwd; showSystem(); }
            else { document.getElementById('loginError').classList.remove('hidden'); }
        }

        function showSystem() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            loadMeetings();
        }

        function logout() { sessionStorage.removeItem('meeting_access_token'); location.reload(); }

        async function loadMeetings() {
            try {
                const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': authToken } });
                if (!res.ok) { logout(); return; }
                meetingDataList = await res.json();
                renderTable();
            } catch (e) { console.error(e); }
        }

        function renderTable() {
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];

            meetingDataList.forEach((m, index) => {
                const isFuture = m.meeting_time.split('T')[0] >= today;
                const rowClass = isFuture ? 'bg-pink-500/5 border-l-4 border-l-pink-400' : 'opacity-60 grayscale-[0.5]';
                
                // 时间解析
                const startDay = m.meeting_time.split('T')[0];
                const startTime = m.meeting_time.split('T')[1];
                const endTime = (m.meeting_end_time || '').split('T')[1] || '--:--';

                tbody.innerHTML += `
                    <tr class="hover:bg-slate-50 transition-colors border-b border-slate-50 ${rowClass}">
                        <td class="text-center font-mono text-[10px] text-slate-400">${index + 1}</td>
                        <td class="col-title pl-4 py-3">
                            <div class="text-sm font-bold text-slate-800 text-tight">${m.title}</div>
                        </td>
                        <td class="col-time text-center">
                            <div class="text-[10px] text-slate-400 font-medium">${startDay}</div>
                            <div class="flex flex-col mt-0.5">
                                <span class="text-blue-600 font-bold text-[11px] leading-none">始 ${startTime}</span>
                                <span class="text-pink-500 font-bold text-[11px] mt-1 leading-none">终 ${endTime}</span>
                            </div>
                        </td>
                        <td class="col-loc text-center text-xs font-bold text-slate-600">${m.location}</td>
                        <td class="col-type text-center">
                            <span class="tag-nowrap px-2 py-0.5 rounded-md border border-slate-200 bg-white text-[10px] font-bold">
                                ${m.meeting_type}
                            </span>
                        </td>
                        <td class="col-dept text-center text-xs">${m.department || '-'}</td>
                        <td class="col-leader text-center">${createLeaderTags(m.leader)}</td>
                        <td class="col-range text-center text-[10px] text-slate-500">${m.status}</td>
                        <td class="col-notes pl-4 text-[11px] text-slate-500 leading-snug">${m.notes || '-'}</td>
                        <td class="col-action no-export text-center">
                            <div class="flex flex-col gap-1.5 items-center">
                                <button onclick="editMeeting(${m.id})" class="text-blue-500 font-bold text-[10px] hover:underline">修改</button>
                                <button onclick="deleteMeeting(${m.id})" class="text-red-300 font-bold text-[10px] hover:text-red-500 hover:underline">删除</button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        function createLeaderTags(str) {
            if (!str || str === '-') return '-';
            return `<div class="flex flex-wrap justify-center gap-1">` + 
                str.split(/[、,，\s]+/).filter(n => n.trim() !== '').map(name => 
                `<span class="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded text-[9px] font-medium border border-slate-200">${name}</span>`
            ).join('') + `</div>`;
        }

        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                meeting_end_time: document.getElementById('meeting_end_time').value,
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                department: document.getElementById('department').value,
                leader: document.getElementById('leader').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };
            await fetch('/api/meetings', {
                method: editId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Web-Password': authToken },
                body: JSON.stringify(data)
            });
            resetForm(); loadMeetings();
        });

        function editMeeting(id) {
            const m = meetingDataList.find(i => i.id === id);
            document.getElementById('edit_id').value = m.id;
            document.getElementById('title').value = m.title;
            document.getElementById('meeting_time').value = m.meeting_time;
            document.getElementById('meeting_end_time').value = m.meeting_end_time || '';
            document.getElementById('location').value = m.location;
            document.getElementById('meeting_type').value = m.meeting_type;
            document.getElementById('department').value = m.department;
            document.getElementById('leader').value = m.leader;
            document.getElementById('status').value = m.status;
            document.getElementById('notes').value = m.notes;
            document.getElementById('formTitle').innerText = '✏️ 修改现有排期';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteMeeting(id) {
            const pwd = prompt("删除确认密码："); if (!pwd) return;
            const res = await fetch(`/api/meetings?id=${id}`, {
                method: 'DELETE',
                headers: { 'X-Admin-Password': pwd, 'X-Web-Password': authToken }
            });
            if (res.ok) loadMeetings(); else alert("认证不通过");
        }

        function resetForm() {
            document.getElementById('addMeetingForm').reset();
            document.getElementById('edit_id').value = '';
            document.getElementById('formTitle').innerText = '➕ 新增任务排期';
        }

        function exportToExcel() {
            const table = document.getElementById('meetingTableMain');
            const noExportItems = document.querySelectorAll('.no-export');
            noExportItems.forEach(el => el.style.display = 'none');
            const wb = XLSX.utils.table_to_book(table, { sheet: "每周会议保障" });
            noExportItems.forEach(el => el.style.display = '');
            XLSX.writeFile(wb, `保障排期表_${new Date().toLocaleDateString().replace(/\//g,'-')}.xlsx`);
        }
    </script>
</body>
</html>
