<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会议保障排期表</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        .table-container {
            border: 1px solid #f3f4f6;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03);
            background: white;
        }
        
        /* 启用固定表格布局，精准控制列宽，把剩余空间全给备注 */
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        
        thead th {
            background-color: #f8fafc;
            border-bottom: 1px solid #f1f5f9;
            color: #475569;
            font-weight: 700;
            padding: 16px 8px !important;
            font-size: 0.9rem;
            vertical-align: middle;
            white-space: nowrap !important; 
        }

        tbody td {
            border-bottom: 1px solid #f8fafc;
            padding: 14px 8px !important;
            vertical-align: middle;
            color: #334155;
        }
        tbody tr:last-child td { border-bottom: none; }

        /* 参会领导列：宽度绝对锁死 */
        .leader-column {
            width: 160px !important;
        }
        
        /* 备注列：宽度自适应，强制换行 */
        .notes-column {
            word-wrap: break-word;
            word-break: break-all;
            white-space: normal !important;
            text-align: left !important;
            line-height: 1.5;
        }

        #mainContent { display: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        .form-control {
            border: 1px solid #cbd5e1 !important; 
            background-color: #fff !important;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
            outline: none;
        }
        
        .row-highlight {
            background-color: #fdfaef; 
            border-left: 3px solid #f472b6;
        }
        .row-highlight:hover { background-color: #fdf2f8; }
        .row-normal {
            background-color: #ffffff;
            border-left: 3px solid transparent;
        }
        .row-normal:hover { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <div id="loginOverlay" class="fixed inset-0 flex items-center justify-center z-[999]">
        <div class="absolute inset-0 bg-gradient-to-br from-blue-400 to-sky-200"></div>
        <div class="relative bg-white/80 backdrop-blur-xl p-10 rounded-[2.5rem] shadow-2xl w-[400px] text-center">
            <h2 class="text-2xl font-black mb-6 text-gray-800">安全认证</h2>
            <input type="password" id="webPassInput" placeholder="请输入访问密码" onkeypress="if(event.keyCode==13) checkLogin()" class="form-control w-full p-4 rounded-xl text-center mb-4">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700">进入系统</button>
            <p id="loginError" class="text-red-500 mt-4 text-sm hidden">⚠️ 密码错误</p>
        </div>
    </div>

    <div id="mainContent" class="p-6">
        <div class="w-[98%] mx-auto">
            <div class="flex justify-between items-end mb-6">
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-black text-slate-800">会议保障排期表</h1>
                </div>
                <button onclick="exportToExcel()" class="bg-white border border-gray-200 text-gray-600 px-5 py-2 rounded-lg font-medium shadow-sm hover:bg-gray-50 transition-all text-sm">
                    导出 Excel
                </button>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm mb-6 border border-gray-100">
                <h2 class="text-lg font-bold mb-6 text-gray-800 flex items-center gap-2" id="formTitle">
                    <span class="text-blue-600 text-xl">+</span> 新增会议任务
                </h2>
                <form id="addMeetingForm" class="grid grid-cols-1 md:grid-cols-12 gap-x-6 gap-y-5">
                    <input type="hidden" id="edit_id">
                    
                    <div class="md:col-span-6 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">会议名称</label>
                        <input type="text" id="title" placeholder="请输入会议完整标题" required class="form-control p-2.5 rounded-lg text-sm">
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">开始时间</label>
                        <input type="datetime-local" id="meeting_time" required class="form-control p-2.5 rounded-lg text-sm">
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">结束时间</label>
                        <input type="datetime-local" id="meeting_end_time" class="form-control p-2.5 rounded-lg text-sm">
                    </div>

                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">会议地点</label>
                        <select id="location" required class="form-control p-2.5 rounded-lg text-sm">
                            <option value="" disabled selected>请选择地点</option>
                            <option value="会商室">会商室</option>
                            <option value="值班室">值班室</option>
                            <option value="指挥中心">指挥中心</option>
                            <option value="西会议室">西会议室</option>
                        </select>
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">会议类型</label>
                        <select id="meeting_type" class="form-control p-2.5 rounded-lg text-sm">
                            <option value="本地会">本地会</option>
                            <option value="视频会">视频会</option>
                            <option value="调度会">调度会</option>
                        </select>
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">主办科室</label>
                        <input type="text" id="department" placeholder="主办科室" class="form-control p-2.5 rounded-lg text-sm">
                    </div>
                    <div class="md:col-span-3 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">参会范围</label>
                        <select id="status" class="form-control p-2.5 rounded-lg text-sm">
                            <option value="市级">市级</option>
                            <option value="区市参加">区市参加</option>
                            <option value="区市、镇街参加">区市、镇街参加</option>
                        </select>
                    </div>

                    <div class="md:col-span-12 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">参会领导</label>
                        <input type="text" id="leader" placeholder="多个领导请用空格、逗号隔开" class="form-control p-2.5 rounded-lg text-sm">
                    </div>
                    <div class="md:col-span-12 flex flex-col gap-1.5">
                        <label class="text-xs text-gray-500">保障备注</label>
                        <input type="text" id="notes" placeholder="请输入具体保障要求（如：需桌牌、茶水、投影等）" class="form-control p-2.5 rounded-lg text-sm w-full">
                    </div>

                    <div class="md:col-span-12 flex justify-end mt-2">
                        <button type="submit" class="bg-blue-600 text-white px-8 py-2.5 rounded-lg font-medium shadow-sm hover:bg-blue-700 text-sm">
                            保存会议任务 ✓
                        </button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table id="meetingTableMain">
                    <thead>
                        <tr>
                            <th style="width: 50px;" class="text-center">序号</th>
                            <th style="width: 15%;" class="text-center">会议名称</th>
                            <th style="width: 140px;" class="text-center">起止时间</th>
                            <th style="width: 130px;" class="text-center">地点 / 类型</th>
                            <th style="width: 100px;" class="text-center">主办科室</th>
                            <th style="width: 160px;" class="text-center">参会领导</th>
                            <th style="width: 90px;" class="text-center">范围</th>
                            <th class="text-left">备注</th>
                            <th style="width: 80px;" class="text-center no-export">操作</th>
                        </tr>
                    </thead>
                    <tbody id="meetingList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let meetingDataList = [];
        let authToken = sessionStorage.getItem('meeting_access_token');

        window.onload = () => { if (authToken) showSystem(); };

        async function checkLogin() {
            const pwd = document.getElementById('webPassInput').value;
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': pwd } });
            if (res.ok) { sessionStorage.setItem('meeting_access_token', pwd); authToken = pwd; showSystem(); }
            else { document.getElementById('loginError').classList.remove('hidden'); }
        }

        function showSystem() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').style.display = 'block';
            loadMeetings();
        }

        async function loadMeetings() {
            const res = await fetch('/api/meetings', { headers: { 'X-Web-Password': authToken } });
            meetingDataList = await res.json();
            renderTable();
        }

        // ==========================================
        // UI 渲染逻辑
        // ==========================================

        // 时间格式化：始（蓝） 终（红）
        function formatTime(startStr, endStr) {
            if (!startStr) return '-';
            const start = startStr.replace('T', ' ');
            let html = `<div class="text-[12px] text-blue-600 font-semibold mb-1 tracking-tight">始: ${start}</div>`;
            if (endStr) {
                const end = endStr.replace('T', ' ');
                html += `<div class="text-[12px] text-red-500 font-semibold tracking-tight">终: ${end}</div>`;
            }
            return html;
        }

        // [永远锁死，不可修改] 参会领导：一行最多两个，多出自动换行，软蓝色调
        function createLeaderTags(str) {
            if (!str || str === '-') return '-';
            const names = str.split(/[、,，\s]+/).filter(n => n.trim() !== '');
            let html = `<div class="flex flex-wrap gap-1.5 justify-center w-full">`;
            names.forEach(name => {
                html += `<span class="inline-block bg-[#f1f5f9] text-[#475569] border border-[#e2e8f0] px-2.5 py-1 rounded-[6px] text-[12px] whitespace-nowrap text-center w-[calc(50%-4px)]">${name}</span>`;
            });
            html += `</div>`;
            return html;
        }

        function renderTable() {
            const tbody = document.getElementById('meetingList');
            tbody.innerHTML = '';
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const typeColorMap = {
                '视频会': 'bg-purple-100 text-purple-600',
                '本地会': 'bg-blue-100 text-blue-600',
                '调度会': 'bg-orange-100 text-orange-600'
            };

            meetingDataList.forEach((m, index) => {
                const meetingDate = new Date(m.meeting_time);
                const isHighlight = meetingDate >= today;
                const rowClass = isHighlight ? 'row-highlight bg-pink-50/30' : 'row-normal';
                
                const typeStyle = typeColorMap[m.meeting_type] || 'bg-gray-100 text-gray-600';
                
                let statusHtml = m.status;
                if (m.status === '区市参加') {
                    statusHtml = `<span class="text-blue-600 font-bold">${m.status}</span>`;
                }

                tbody.innerHTML += `
                    <tr class="transition-colors ${rowClass}">
                        <td class="text-center text-gray-400 text-sm">${index + 1}</td>
                        <td class="text-center text-[14px] font-bold text-gray-800">${m.title}</td>
                        <td class="text-center">${formatTime(m.meeting_time, m.meeting_end_time)}</td>
                        
                        <td class="text-center">
                            <div class="flex flex-col items-center justify-center gap-1.5">
                                <span class="text-[13px] text-gray-700 font-medium">${m.location}</span>
                                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${typeStyle} whitespace-nowrap">${m.meeting_type}</span>
                            </div>
                        </td>
                        
                        <td class="text-center text-sm text-gray-600">${m.department || '-'}</td>
                        <td class="leader-column text-center px-1">${createLeaderTags(m.leader)}</td>
                        <td class="text-center text-sm">${statusHtml}</td>
                        <td class="notes-column text-[13px] text-gray-600">${m.notes || '-'}</td>
                        <td class="text-center no-export whitespace-nowrap">
                            <div class="flex flex-col items-center gap-2">
                                <button onclick="editMeeting(${m.id})" class="text-blue-500 hover:text-blue-700 text-xs font-medium">修改</button>
                                <button onclick="deleteMeeting(${m.id})" class="text-red-400 hover:text-red-600 text-xs font-medium">删除</button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        // ==========================================
        // 数据操作逻辑
        // ==========================================

        document.getElementById('addMeetingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit_id').value;
            const data = {
                id: editId ? Number(editId) : undefined,
                title: document.getElementById('title').value,
                meeting_time: document.getElementById('meeting_time').value,
                meeting_end_time: document.getElementById('meeting_end_time').value,
                location: document.getElementById('location').value,
                meeting_type: document.getElementById('meeting_type').value,
                department: document.getElementById('department').value,
                leader: document.getElementById('leader').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value
            };
            await fetch('/api/meetings', {
                method: editId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Web-Password': authToken },
                body: JSON.stringify(data)
            });
            e.target.reset();
            document.getElementById('edit_id').value = '';
            document.getElementById('formTitle').innerHTML = '<span class="text-blue-600 text-xl">+</span> 新增会议任务';
            loadMeetings();
        });

        async function deleteMeeting(id) {
            if(!confirm("确定删除该会议吗？")) return;
            await fetch(`/api/meetings?id=${id}`, { 
                method: 'DELETE', 
                headers: { 'X-Web-Password': authToken, 'X-Admin-Password': authToken } 
            });
            loadMeetings();
        }

        function editMeeting(id) {
            const m = meetingDataList.find(i => i.id === id);
            document.getElementById('edit_id').value = m.id;
            document.getElementById('title').value = m.title;
            document.getElementById('meeting_time').value = m.meeting_time;
            document.getElementById('meeting_end_time').value = m.meeting_end_time || '';
            document.getElementById('location').value = m.location;
            document.getElementById('meeting_type').value = m.meeting_type;
            document.getElementById('department').value = m.department || '';
            document.getElementById('leader').value = m.leader || '';
            document.getElementById('status').value = m.status;
            document.getElementById('notes').value = m.notes || '';
            
            document.getElementById('formTitle').innerHTML = '<span class="text-orange-500 text-xl">✎</span> 修改会议任务';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exportToExcel() {
            const table = document.getElementById('meetingTableMain');
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, `会议保障排期表.xlsx`);
        }
    </script>
</body>
</html>
